<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yazaki — Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-100 via-white to-blue-50 flex items-center justify-center p-4 relative">

  <div class="absolute top-6 left-6 bg-white rounded-lg border-2 border-red-200 shadow-md flex items-center justify-center p-2" style="width:100px;height:60px;">
    <img src="/static/yazaki-logo.png" alt="Yazaki" class="w-full h-full object-contain"/>
  </div>

  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-10 border-t-8 border-red-600">

      <div class="mb-8 text-center">
        <div class="inline-block bg-gradient-to-r from-red-600 to-black text-white rounded-xl px-6 py-3 mb-4">
          <h1 class="text-2xl font-bold">Security Portal</h1>
        </div>
        <h2 class="text-xl text-gray-800 font-bold mb-1">Create Account</h2>
        <p class="text-gray-500 text-sm">Request access to YAZAKI Dashboard</p>
      </div>

      <form onsubmit="handleSignup(event)" class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
          <input id="fullName" type="text" placeholder="Enter your full name"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-red-600 focus:outline-none transition-colors"/>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Matricule Number</label>
          <input id="matricule" type="text" placeholder="Enter your matricule"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-red-600 focus:outline-none transition-colors"/>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
          <input id="email" type="email" placeholder="Enter your email"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-red-600 focus:outline-none transition-colors"/>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
          <input id="password" type="password" placeholder="Enter your password"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-red-600 focus:outline-none transition-colors"/>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Confirm Password</label>
          <input id="confirmPassword" type="password" placeholder="Confirm your password"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-red-600 focus:outline-none transition-colors"/>
        </div>

        <div id="error-box" class="hidden bg-red-50 border-l-4 border-red-600 p-4 rounded">
          <p class="text-red-700 text-sm font-medium"></p>
        </div>

        <button type="submit"
          class="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800
                 text-white font-bold py-4 rounded-lg shadow-lg hover:shadow-xl
                 transform hover:scale-[1.02] active:scale-[0.98] transition-all duration-200">
          Request Access
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-200 text-center">
        <p class="text-sm text-gray-500">
          Already have an account?
          <a href="/" class="text-red-600 font-bold hover:underline">Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    async function handleSignup(e) {
      e.preventDefault();
      const full_name       = document.getElementById('fullName').value.trim();
      const matricule       = document.getElementById('matricule').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const errorBox        = document.getElementById('error-box');
      errorBox.classList.add('hidden');

      if (!full_name || !matricule || !email || !password || !confirmPassword) {
        showError('Please fill in all fields.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ full_name, matricule, email, password })
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/pending';
          return;
        }

        showError(data.error || 'Registration failed.');
      } catch {
        showError('Cannot reach the server.');
      }
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.classList.remove('hidden');
      box.querySelector('p').textContent = msg;
    }
  </script>
</body>
</html>
