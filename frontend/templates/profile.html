<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yazaki — Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-blue-50 overflow-auto">
<div class="p-8">
  <div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-2xl shadow-2xl border-4 border-red-600 p-8">

      <!-- Header -->
      <div class="bg-gradient-to-r from-red-600 to-black text-white rounded-xl p-6 mb-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold" id="title">Profile</h1>
        <p class="text-sm mt-2 opacity-90" id="header-name"></p>
      </div>

      <!-- Personal Information -->
      <div class="mb-8">
        <h2 id="label-personal" class="text-xl font-bold text-gray-900 mb-4 pb-2 border-b-2 border-gray-200">
          Personal Information
        </h2>
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2" id="label-name">Full Name</label>
              <input id="field-name" type="text" readonly
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700"/>
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2" id="label-matricule">Matricule</label>
              <input id="field-matricule" type="text" readonly
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700"/>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2" id="label-email">Email</label>
              <div class="flex gap-2">
                <input id="field-email" type="email"
                  class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700" readonly/>
                <!-- Edit button -->
                <button id="btn-edit" onclick="startEditEmail()"
                  class="px-3 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                  ✏️
                </button>
                <!-- Save button (hidden by default) -->
                <button id="btn-save" onclick="saveEmail()" style="display:none"
                  class="px-3 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                  ✓
                </button>
                <!-- Cancel button (hidden by default) -->
                <button id="btn-cancel" onclick="cancelEditEmail()" style="display:none"
                  class="px-3 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors">
                  ✕
                </button>
              </div>
              <p id="email-error" class="text-red-600 text-xs mt-1 hidden"></p>
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2" id="label-role">Role</label>
              <input id="field-role" type="text" readonly
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700"/>
            </div>
          </div>
        </div>
      </div>

      <!-- Language -->
      <div class="mb-8">
        <h2 id="label-language" class="text-xl font-bold text-gray-900 mb-4 pb-2 border-b-2 border-gray-200">
          Language
        </h2>
        <div class="flex gap-4">
          <button id="btn-en" onclick="setLanguage('en')"
            class="flex-1 px-6 py-3 rounded-lg font-semibold bg-red-600 text-white transition-colors">
            English
          </button>
          <button id="btn-fr" onclick="setLanguage('fr')"
            class="flex-1 px-6 py-3 rounded-lg font-semibold bg-gray-200 text-gray-700 hover:bg-gray-300 transition-colors">
            Français
          </button>
        </div>
      </div>

      <!-- Logout -->
      <div class="pt-6 border-t-2 border-gray-200">
        <button onclick="handleLogout()"
          class="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800
                 text-white font-bold py-4 rounded-lg shadow-lg hover:shadow-xl
                 transform hover:scale-[1.02] active:scale-[0.98] transition-all duration-200">
          → <span id="label-logout">Logout</span>
        </button>
      </div>

    </div>
  </div>
</div>

<script src="/static/sidebar.js"></script>
<script>
  let currentUser = null;
  let currentLang = localStorage.getItem('language') || 'en';

  const translations = {
    en: {
      title: 'Profile', personal: 'Personal Information',
      name: 'Full Name', matricule: 'Matricule',
      email: 'Email', role: 'Role',
      language: 'Language', logout: 'Logout'
    },
    fr: {
      title: 'Profil', personal: 'Informations Personnelles',
      name: 'Nom Complet', matricule: 'Matricule',
      email: 'Email', role: 'Rôle',
      language: 'Langue', logout: 'Déconnexion'
    }
  };

  function applyTranslations(lang) {
    const t = translations[lang];
    document.getElementById('title').textContent = t.title;
    document.getElementById('label-personal').textContent = t.personal;
    document.getElementById('label-name').textContent = t.name;
    document.getElementById('label-matricule').textContent = t.matricule;
    document.getElementById('label-email').textContent = t.email;
    document.getElementById('label-role').textContent = t.role;
    document.getElementById('label-language').textContent = t.language;
    document.getElementById('label-logout').textContent = t.logout;
  }

  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('language', lang);
    applyTranslations(lang);
    document.getElementById('btn-en').className = `flex-1 px-6 py-3 rounded-lg font-semibold transition-colors ${lang === 'en' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`;
    document.getElementById('btn-fr').className = `flex-1 px-6 py-3 rounded-lg font-semibold transition-colors ${lang === 'fr' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`;
  }

  function startEditEmail() {
    const field = document.getElementById('field-email');
    field.readOnly = false;
    field.classList.remove('bg-gray-100', 'border-gray-300');
    field.classList.add('bg-white', 'border-red-600');
    document.getElementById('btn-edit').style.display = 'none';
    document.getElementById('btn-save').style.display = 'block';
    document.getElementById('btn-cancel').style.display = 'block';
    field.focus();
  }

  function cancelEditEmail() {
    const field = document.getElementById('field-email');
    field.value = currentUser.email;
    field.readOnly = true;
    field.classList.add('bg-gray-100', 'border-gray-300');
    field.classList.remove('bg-white', 'border-red-600');
    document.getElementById('btn-edit').style.display = 'block';
    document.getElementById('btn-save').style.display = 'none';
    document.getElementById('btn-cancel').style.display = 'none';
    document.getElementById('email-error').classList.add('hidden');
  }

  async function saveEmail() {
    const newEmail = document.getElementById('field-email').value.trim();
    const errorEl = document.getElementById('email-error');
    errorEl.classList.add('hidden');

    if (!newEmail || !newEmail.includes('@')) {
      errorEl.textContent = 'Please enter a valid email.';
      errorEl.classList.remove('hidden');
      return;
    }

    try {
      const res = await fetch('/api/auth/update-email', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: newEmail })
      });
      const data = await res.json();
      if (!res.ok) {
        errorEl.textContent = data.error || 'Failed to update email.';
        errorEl.classList.remove('hidden');
        return;
      }
      currentUser.email = newEmail;
      cancelEditEmail();
    } catch {
      errorEl.textContent = 'Cannot reach the server.';
      errorEl.classList.remove('hidden');
    }
  }

  async function handleLogout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    sessionStorage.clear();
    localStorage.removeItem('role');
    localStorage.removeItem('full_name');
    window.location.href = '/';
  }

  (async () => {
    const user = await checkAuth();
    if (!user) return;
    currentUser = user;

    document.getElementById('header-name').textContent = user.full_name;
    document.getElementById('field-name').value = user.full_name;
    document.getElementById('field-matricule').value = user.matricule;
    document.getElementById('field-role').value = user.role.charAt(0).toUpperCase() + user.role.slice(1);

    // Load email from server
    const emailRes = await fetch('/api/auth/me');
    const meData = await emailRes.json();
    document.getElementById('field-email').value = meData.email || '';
    currentUser.email = meData.email || '';

    applyTranslations(currentLang);
    setLanguage(currentLang);
    buildSidebar('/profile');
  })();
</script>
</body>
</html>
