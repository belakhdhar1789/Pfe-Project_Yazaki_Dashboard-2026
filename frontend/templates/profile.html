<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — Yazaki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    #sidebar-panel {
      position: fixed; top: 0; right: -260px; width: 260px; height: 100vh;
      background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.15);
      transition: right 0.3s ease; z-index: 1000;
      display: flex; flex-direction: column;
    }
    #sidebar-trigger {
      position: fixed; top: 0; right: 0; width: 18px; height: 100vh;
      background: linear-gradient(to bottom, #dc2626, #111);
      cursor: pointer; z-index: 1001;
      display: flex; align-items: center; justify-content: center;
    }
    #sidebar-trigger span {
      writing-mode: vertical-rl; color: white; font-size: 10px;
      font-weight: bold; letter-spacing: 2px; opacity: 0.7;
    }
    #sidebar-panel.open { right: 0; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-blue-50">

  <div id="sidebar-trigger" onmouseenter="openSidebar()"></div>

  <div id="sidebar-panel" onmouseleave="closeSidebar()">
    <!-- Sidebar Header -->
    <div class="bg-gradient-to-r from-red-600 to-black text-white rounded-xl p-4 m-4 shadow-lg text-center">
      <h2 class="text-xl font-bold">Navigation Menu</h2>
      <p class="text-xs mt-1 opacity-90">Dashboard de Suivi</p>
    </div>
    <!-- Menu items -->
    <div class="flex-1 overflow-y-auto px-4" id="sidebar-menu"></div>
    <!-- Footer -->
    <div class="p-4 border-t-2 border-gray-300 text-center">
      <div id="sidebar-user" class="text-xs text-gray-600 font-semibold mb-2"></div>
      <p class="text-xs text-gray-500 mb-3">YAZAKI Manufacturing Dashboard</p>
      <button onclick="handleLogout()"
        class="w-full border-2 rounded-xl p-3 text-center font-bold text-sm
               bg-red-600 text-white border-red-600 hover:bg-red-700 transition-colors">
        Sign Out
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="p-8 mr-5">
    <div class="max-w-4xl mx-auto">
      <div class="bg-white rounded-2xl shadow-2xl border-4 border-red-600 p-8">

        <!-- Header -->
        <div class="bg-gradient-to-r from-red-600 to-black text-white rounded-xl p-6 mb-6 text-center shadow-lg">
          <h1 class="text-3xl font-bold" id="hdr-title">Profile</h1>
          <p class="text-sm mt-2 opacity-90" id="hdr-name">—</p>
        </div>

        <!-- Personal Info -->
        <div class="mb-8">
          <h2 class="text-xl font-bold text-gray-900 mb-4 pb-2 border-b-2 border-gray-200"
            id="sec-personal">Personal Information</h2>

          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <!-- Full Name -->
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-2" id="lbl-name">Full Name</label>
                <input id="field-name" type="text" readonly
                  class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700"/>
              </div>
              <!-- Matricule -->
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-2" id="lbl-mat">Matricule</label>
                <input id="field-mat" type="text" readonly
                  class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700"/>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <!-- Email (editable) -->
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-2" id="lbl-email">Email</label>
                <div class="flex gap-2">
                  <input id="field-email" type="email" readonly
                    class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700"/>
                  <!-- Pencil button -->
                  <button id="btn-edit-email" onclick="startEditEmail()"
                    class="px-3 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5
                           m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                  </button>
                  <!-- Save button (hidden initially) -->
                  <button id="btn-save-email" onclick="saveEmail()" style="display:none"
                    class="px-3 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                  </button>
                  <!-- Cancel button (hidden initially) -->
                  <button id="btn-cancel-email" onclick="cancelEmail()" style="display:none"
                    class="px-3 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                  </button>
                </div>
                <p id="email-error" class="text-red-600 text-xs mt-1 hidden"></p>
              </div>
              <!-- Role -->
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-2" id="lbl-role">Role</label>
                <input id="field-role" type="text" readonly
                  class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700"/>
              </div>
            </div>
          </div>
        </div>

        <!-- Language -->
        <div class="mb-8">
          <h2 class="text-xl font-bold text-gray-900 mb-4 pb-2 border-b-2 border-gray-200"
            id="sec-lang">Language</h2>
          <div class="flex gap-4">
            <button id="lang-en" onclick="setLang('en')"
              class="flex-1 px-6 py-3 rounded-lg font-semibold transition-colors bg-red-600 text-white">
              English
            </button>
            <button id="lang-fr" onclick="setLang('fr')"
              class="flex-1 px-6 py-3 rounded-lg font-semibold transition-colors bg-gray-200 text-gray-700 hover:bg-gray-300">
              Français
            </button>
          </div>
        </div>

        <!-- Logout -->
        <div class="pt-6 border-t-2 border-gray-200">
          <button onclick="handleLogout()"
            class="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800
                   text-white font-bold py-4 rounded-lg shadow-lg hover:shadow-xl
                   transform hover:scale-[1.02] active:scale-[0.98] transition-all duration-200
                   flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <span id="btn-logout-label">Logout</span>
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="/static/sidebar.js"></script>

  <script>
    let lang = localStorage.getItem('language') || 'en';
    let currentUser = null;
    let originalEmail = '';

    const T = {
      en: {
        title: 'Profile', personal: 'Personal Information',
        name: 'Full Name', mat: 'Matricule', email: 'Email', role: 'Role',
        language: 'Language', logout: 'Logout',
        emailInvalid: 'Please enter a valid email.',
        emailSaved: 'Email updated successfully.',
      },
      fr: {
        title: 'Profil', personal: 'Informations Personnelles',
        name: 'Nom Complet', mat: 'Matricule', email: 'Email', role: 'Rôle',
        language: 'Langue', logout: 'Déconnexion',
        emailInvalid: 'Veuillez entrer un email valide.',
        emailSaved: 'Email mis à jour avec succès.',
      }
    };
    function t(k) { return (T[lang]||T.en)[k]||k; }

    function applyLang() {
      document.getElementById('hdr-title').textContent    = t('title');
      document.getElementById('sec-personal').textContent = t('personal');
      document.getElementById('lbl-name').textContent     = t('name');
      document.getElementById('lbl-mat').textContent      = t('mat');
      document.getElementById('lbl-email').textContent    = t('email');
      document.getElementById('lbl-role').textContent     = t('role');
      document.getElementById('sec-lang').textContent     = t('language');
      document.getElementById('btn-logout-label').textContent = t('logout');
      document.getElementById('lang-en').className = 'flex-1 px-6 py-3 rounded-lg font-semibold transition-colors ' +
        (lang==='en' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300');
      document.getElementById('lang-fr').className = 'flex-1 px-6 py-3 rounded-lg font-semibold transition-colors ' +
        (lang==='fr' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300');
    }

    function setLang(l) {
      lang = l;
      localStorage.setItem('language', l);
      applyLang();
    }

    function toggleSidebar() {
      document.getElementById('sidebar-panel').classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      const panel   = document.getElementById('sidebar-panel');
      const trigger = document.getElementById('sidebar-trigger');
      if (!panel.contains(e.target) && !trigger.contains(e.target)) panel.classList.remove('open');
    });

    // ── Email editing ──────────────────────────────────────
    function startEditEmail() {
      const input = document.getElementById('field-email');
      input.readOnly = false;
      input.className = 'flex-1 px-4 py-3 border-2 border-red-600 rounded-lg bg-white text-gray-900';
      input.focus();
      document.getElementById('btn-edit-email').style.display   = 'none';
      document.getElementById('btn-save-email').style.display   = '';
      document.getElementById('btn-cancel-email').style.display = '';
    }

    async function saveEmail() {
      const input = document.getElementById('field-email');
      const email = input.value.trim();
      const errEl = document.getElementById('email-error');
      if (!email || !email.includes('@')) {
        errEl.textContent = t('emailInvalid');
        errEl.classList.remove('hidden');
        return;
      }
      errEl.classList.add('hidden');
      try {
        const res  = await fetch('/api/auth/update-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; errEl.classList.remove('hidden'); return; }
        originalEmail = email;
        currentUser.email = email;
        resetEmailField();
      } catch(e) {
        errEl.textContent = 'Server error.';
        errEl.classList.remove('hidden');
      }
    }

    function cancelEmail() {
      document.getElementById('field-email').value = originalEmail;
      document.getElementById('email-error').classList.add('hidden');
      resetEmailField();
    }

    function resetEmailField() {
      const input = document.getElementById('field-email');
      input.readOnly = true;
      input.className = 'flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg bg-gray-100 text-gray-700';
      document.getElementById('btn-edit-email').style.display   = '';
      document.getElementById('btn-save-email').style.display   = 'none';
      document.getElementById('btn-cancel-email').style.display = 'none';
    }

    // ── Init ───────────────────────────────────────────────
    checkAuth().then(user => {
      currentUser = user;
      originalEmail = user.email;
      buildSidebar('/profile', user);
      document.getElementById('sidebar-user').textContent = 'Logged in as: ' + user.full_name;
      document.getElementById('hdr-name').textContent   = user.full_name;
      document.getElementById('field-name').value       = user.full_name;
      document.getElementById('field-mat').value        = user.matricule;
      document.getElementById('field-email').value      = user.email;
      document.getElementById('field-role').value       = user.role.charAt(0).toUpperCase() + user.role.slice(1);
      applyLang();
    });
  </script>
</body>
</html>
