<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yazaki — En attente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-100 via-white to-blue-50 flex items-center justify-center p-4 relative">

  <!-- Yazaki Logo — Top Left -->
  <div class="absolute top-6 left-6 bg-white rounded-lg border-2 border-red-200 shadow-md flex items-center justify-center p-2"
       style="width:100px;height:60px;">
    <img src="/static/yazaki-logo.png" alt="Yazaki" class="w-full h-full object-contain"/>
  </div>

  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-10 border-t-8 border-red-600">

      <!-- Header -->
      <div class="mb-6 text-center">
        <div class="inline-block bg-gradient-to-r from-red-600 to-black text-white rounded-xl px-6 py-3 mb-4">
          <h1 class="text-2xl font-bold">Security Portal</h1>
        </div>
        <h2 class="text-xl text-gray-800 font-bold">YAZAKI Dashboard</h2>
      </div>

      <!-- Success Icon -->
      <div class="flex justify-center mb-6">
        <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center">
          <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
      </div>

      <!-- Message -->
      <div class="text-center mb-6">
        <h3 class="text-xl font-bold text-gray-800 mb-4">Thanks for Submitting Your Data</h3>
        <div class="bg-yellow-50 border-l-4 border-yellow-400 rounded-lg p-4 text-center">
          <p class="text-sm text-gray-600 mb-1">Actual Status:</p>
          <p class="text-yellow-600 font-bold text-base">Waiting for the ADMIN Approval</p>
        </div>
      </div>

      <p class="text-center text-gray-500 text-sm mb-8">
        You will be notified once your access has been approved by the administrator.
      </p>

      <div class="pt-6 border-t border-gray-200">
        <p class="text-xs text-gray-400 text-center">YAZAKI Security Portal - Access Management</p>
      </div>
    </div>
  </div>
</body>
</html>
