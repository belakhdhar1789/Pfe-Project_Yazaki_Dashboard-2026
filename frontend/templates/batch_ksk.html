<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Overview Batch-KSK — Yazaki</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }

    /* ── Sidebar ── */
    #sidebar-panel {
      position: fixed; top: 0; right: -260px; width: 260px; height: 100vh;
      background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.15);
      transition: right 0.3s ease; z-index: 1000;
      display: flex; flex-direction: column;
    }
    #sidebar-trigger {
      position: fixed; top: 0; right: 0; width: 18px; height: 100vh;
      background: linear-gradient(to bottom, #dc2626, #111);
      cursor: pointer; z-index: 1001;
      display: flex; align-items: center; justify-content: center;
    }
    #sidebar-trigger span {
      writing-mode: vertical-rl; color: white; font-size: 10px;
      font-weight: bold; letter-spacing: 2px; opacity: 0.7;
    }
    #sidebar-panel.open { right: 0; }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-radius: 8px; margin: 2px 8px;
      color: #374151; text-decoration: none; font-size: 13px;
      font-weight: 500; transition: all 0.2s; cursor: pointer;
    }
    .sidebar-link:hover { background: #fee2e2; color: #dc2626; }
    .sidebar-link.active { background: #dc2626; color: white; }

    /* Cell types */
    .cell-entry   { background: #dbeafe; }   /* blue-100   — data entry */
    .cell-formula { background: #fde047; }   /* yellow-300 — formula    */
    .cell-ratio   { background: #bbf7d0; }   /* green-200  — ratio      */
    .cell-header  { background: #d1d5db; }   /* gray-300   — header     */

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-blue-50">

  <div id="sidebar-trigger" onclick="toggleSidebar()"><span>MENU</span></div>

  <div id="sidebar-panel">
    <div class="bg-gradient-to-b from-red-600 to-black p-4 flex items-center gap-3">
      <img src="/static/yazaki-logo.png" alt="Yazaki"
           class="w-10 h-10 object-contain bg-white rounded p-1"/>
      <div>
        <div class="text-white font-bold text-sm">YAZAKI</div>
        <div class="text-red-200 text-xs">Dashboard System</div>
      </div>
    </div>
    <div class="flex-1 overflow-y-auto py-3" id="sidebar-menu"></div>
    <div class="p-3 border-t border-gray-100">
      <div id="sidebar-user" class="text-xs text-gray-500 mb-2 px-2"></div>
      <button onclick="handleLogout()"
        class="w-full flex items-center gap-2 px-3 py-2 bg-red-50 text-red-600
               rounded-lg text-sm font-semibold hover:bg-red-100 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign Out
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="p-8 mr-5">
    <div class="bg-white rounded-2xl shadow-2xl border-4 border-red-600 p-8">

      <!-- Header -->
      <div class="bg-gradient-to-r from-red-600 to-black text-white rounded-xl
                  p-6 mb-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold">Overview Batch-KSK</h1>
        <p class="text-sm mt-2 opacity-90">Vue d'ensemble des Lots de Production</p>
      </div>

      <!-- Legend -->
      <div class="mb-5 flex items-center gap-6 text-xs font-medium">
        <div class="flex items-center gap-2">
          <div class="w-6 h-4 cell-entry border border-gray-400 rounded-sm"></div>
          <span>Data Entry</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-6 h-4 cell-formula border border-gray-400 rounded-sm"></div>
          <span>Formula</span>
        </div>
      </div>

      <!-- Table 1 -->
      <div class="overflow-x-auto mb-8">
        <table class="border-collapse text-xs w-full" id="table1"></table>
      </div>

      <!-- Table 2 -->
      <div class="overflow-x-auto">
        <table class="border-collapse text-xs w-full" id="table2"></table>
      </div>

    </div>
  </div>

  <script src="/static/sidebar.js"></script>
  <script>
    // ── Sidebar ───────────────────────────────────────────────
    function toggleSidebar() {
      document.getElementById('sidebar-panel').classList.toggle('open');
    }
    document.addEventListener('click', e => {
      const panel   = document.getElementById('sidebar-panel');
      const trigger = document.getElementById('sidebar-trigger');
      if (!panel.contains(e.target) && !trigger.contains(e.target))
        panel.classList.remove('open');
    });

    // ── Data ──────────────────────────────────────────────────
    const batchData = [
      { customer:'STELLANTIS', family:'CDPQJF', productivity:'',    variant:'High runner', whPn:'', gum:'80.18', swt:'105.00' },
      { customer:'STELLANTIS', family:'',       productivity:'',    variant:'Small',       whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'STELLANTIS', family:'',       productivity:'',    variant:'Big',         whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'NEW',        family:'TEST',   productivity:'78%', variant:'High runner', whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'NEW',        family:'',       productivity:'',    variant:'Small',       whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'NEW',        family:'',       productivity:'',    variant:'Big',         whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'APT',        family:'TEST',   productivity:'88%', variant:'High runner', whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'APT',        family:'',       productivity:'',    variant:'Small',       whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'APT',        family:'',       productivity:'',    variant:'Big',         whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'MO',         family:'EVA',    productivity:'90%', variant:'High runner', whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'MO',         family:'',       productivity:'',    variant:'Small',       whPn:'', gum:'0.00',  swt:'0.00'   },
      { customer:'MO',         family:'',       productivity:'',    variant:'Big',         whPn:'', gum:'0.00',  swt:'0.00'   },
    ];

    // ── Build Table 1 ─────────────────────────────────────────
    function buildTable1() {
      const t1 = document.getElementById('table1');

      t1.innerHTML = `
        <thead>
          <tr>
            <th rowspan="2" class="border-2 border-gray-500 px-3 py-2 cell-header font-bold text-center">Customer</th>
            <th rowspan="2" class="border-2 border-gray-500 px-3 py-2 cell-header font-bold text-center">Project/Family</th>
            <th rowspan="2" class="border-2 border-gray-500 px-3 py-2 cell-header font-bold text-center">Productivity</th>
            <th rowspan="2" class="border-2 border-gray-500 px-3 py-2 cell-header font-bold text-center">Variant</th>
            <th rowspan="2" class="border-2 border-gray-500 px-3 py-2 cell-header font-bold text-center">WH PN /Carpet</th>
            <th colspan="2" class="border-2 border-gray-500 px-3 py-1 cell-header font-bold text-center">Total</th>
          </tr>
          <tr>
            <th class="border-2 border-gray-500 px-3 py-2 cell-formula font-bold text-center">GUM Times<br/>(min)</th>
            <th class="border-2 border-gray-500 px-3 py-2 cell-formula font-bold text-center">SWT Times<br/>(min)</th>
          </tr>
        </thead>`;

      const groups = {};
      batchData.forEach((r, i) => { (groups[r.customer] = groups[r.customer] || []).push(i); });

      const tbody = document.createElement('tbody');
      batchData.forEach((row, idx) => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 transition-colors';

        const cell = (txt, cls, rs = 1) => {
          const td = document.createElement('td');
          td.className = `border-2 border-gray-500 px-3 py-2 text-center ${cls}`;
          if (rs > 1) td.rowSpan = rs;
          td.textContent = txt;
          return td;
        };

        const grp = groups[row.customer];
        if (grp[0] === idx)
          tr.appendChild(cell(row.customer, 'cell-entry font-semibold', grp.length));

        tr.appendChild(cell(row.family,       'cell-entry'));
        tr.appendChild(cell(row.productivity, 'cell-entry'));
        tr.appendChild(cell(row.variant,      'cell-entry'));
        tr.appendChild(cell(row.whPn,         'cell-entry'));
        tr.appendChild(cell(row.gum,          'cell-formula font-semibold'));
        tr.appendChild(cell(row.swt,          'cell-formula font-semibold'));

        tbody.appendChild(tr);
      });
      t1.appendChild(tbody);
    }

    buildTable1();

    // ── Build Table 2 ─────────────────────────────────────────
    // Table 2 data — P1/P2/P3 GUM & AWT times per row
    // Ratio columns = AWT/GUM (computed). Empty inputs = data entry cells.
    const table2Data = batchData.map(() => ({
      p1Gum: '', p1Awt: '',
      p2Gum: '', p2Awt: '',
      p3Gum: '', p3Awt: '',
    }));

    function calcRatio(awt, gum) {
      const a = parseFloat(awt), g = parseFloat(gum);
      if (!g || isNaN(a) || isNaN(g)) return '#DIV/0!';
      return (a / g).toFixed(4);
    }

    function buildTable2() {
      const t2 = document.getElementById('table2');

      t2.innerHTML = `
        <thead>
          <tr>
            <th class="border-2 border-gray-500 px-2 py-1 cell-formula font-bold text-center"
                rowspan="3">Total<br/>AWT/GUM</th>
            <th colspan="6" class="border-2 border-gray-500 px-2 py-1 cell-formula font-bold text-center">Ratio</th>
            <th colspan="3" class="border-2 border-gray-500 px-2 py-1 cell-formula font-bold text-center">Ratio</th>
          </tr>
          <tr>
            <th colspan="2" class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">P1</th>
            <th colspan="2" class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">P2</th>
            <th colspan="2" class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">P3</th>
            <th rowspan="2" class="border-2 border-gray-500 px-2 py-2 cell-formula font-bold text-center">P1<br/>AWT/GUM</th>
            <th rowspan="2" class="border-2 border-gray-500 px-2 py-2 cell-formula font-bold text-center">P2<br/>AWT/GUM</th>
            <th rowspan="2" class="border-2 border-gray-500 px-2 py-2 cell-formula font-bold text-center">P3<br/>AWT/GUM</th>
          </tr>
          <tr>
            <th class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">GUM Times<br/>(min)</th>
            <th class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">AWT Times<br/>(min)</th>
            <th class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">GUM Times<br/>(min)</th>
            <th class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">AWT Times<br/>(min)</th>
            <th class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">GUM Times<br/>(min)</th>
            <th class="border-2 border-gray-500 px-2 py-1 cell-header font-bold text-center">AWT Calcul.<br/>(min)</th>
          </tr>
        </thead>`;

      const tbody = document.createElement('tbody');
      batchData.forEach((_, idx) => {
        const d   = table2Data[idx];
        const tr  = document.createElement('tr');
        tr.className = 'hover:bg-gray-50 transition-colors';

        const cell = (txt, cls) => {
          const td = document.createElement('td');
          td.className = `border-2 border-gray-500 px-2 py-2 text-center text-xs ${cls}`;
          td.textContent = txt;
          return td;
        };

        // Total AWT/GUM — average of P1+P2+P3 AWT divided by P1+P2+P3 GUM
        const totalAwt = [d.p1Awt, d.p2Awt, d.p3Awt].reduce((s, v) => s + (parseFloat(v) || 0), 0);
        const totalGum = [d.p1Gum, d.p2Gum, d.p3Gum].reduce((s, v) => s + (parseFloat(v) || 0), 0);
        tr.appendChild(cell(totalGum ? (totalAwt / totalGum).toFixed(4) : '#DIV/0!', 'cell-ratio font-semibold'));

        tr.appendChild(cell(d.p1Gum, 'cell-entry'));
        tr.appendChild(cell(d.p1Awt, 'cell-entry'));
        tr.appendChild(cell(d.p2Gum, 'cell-entry'));
        tr.appendChild(cell(d.p2Awt, 'cell-entry'));
        tr.appendChild(cell(d.p3Gum, 'cell-entry'));
        tr.appendChild(cell(d.p3Awt, 'cell-entry'));

        tr.appendChild(cell(calcRatio(d.p1Awt, d.p1Gum), 'cell-ratio'));
        tr.appendChild(cell(calcRatio(d.p2Awt, d.p2Gum), 'cell-ratio'));
        tr.appendChild(cell(calcRatio(d.p3Awt, d.p3Gum), 'cell-ratio'));

        tbody.appendChild(tr);
      });
      t2.appendChild(tbody);
    }

    buildTable2();

    // ── Init ─────────────────────────────────────────────────
    checkAuth().then(user => {
      if (!checkPermission(user, 'BatchKsk')) return;
      buildSidebar('/batch-ksk', user);
      document.getElementById('sidebar-user').textContent = 'Logged in as: ' + user.full_name;
    });
  </script>
</body>
</html>
